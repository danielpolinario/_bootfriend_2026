<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bootfriend - Voz de CrianГ§a</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: white; }
        #video-container { width: 800px; height: 600px; position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 0 25px #2ecc71; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
        video.ativo { display: block; }
        button { padding: 12px 28px; font-size: 1.2rem; border-radius: 40px; border: none; background: #2ecc71; color: white; font-weight: bold; margin: 20px 10px 10px; cursor: pointer; }
        button:hover { background: #27ae60; }
        #status { background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 30px; margin-top: 15px; color: #f1c40f; text-align: center; }
        .log { background: #1e1e2f; padding: 8px 12px; border-radius: 12px; font-family: monospace; font-size: 0.7rem; max-width: 800px; margin-top: 15px; overflow-y: auto; max-height: 150px; width: 80%; color: #ccc; }
    </style>
</head>
<body>
<div id="video-container">
    <video id="vid-esperando" src="esperando.mp4" loop muted playsinline class="ativo"></video>
    <video id="vid-falando" src="falando.mp4" loop muted playsinline></video>
</div>
<div>
    <button id="btn-iniciar">рҹҗ• ATIVAR BOOTFRIEND</button>
    <button id="btn-reiniciar" style="display:none;">рҹ”„ REINICIAR</button>
</div>
<div id="status">рҹ”ҳ Clique no botГЈo verde</div>
<div class="log" id="log-area">рҹ“Ӣ <span>Log:</span><br>вң… Pronto!</div>

<script>
    const MISTRAL_API_KEY = "izShTxzAgCk8eqaODmq0LTw9P1AbEDtr";
    
    const vEsp = document.getElementById('vid-esperando');
    const vFal = document.getElementById('vid-falando');
    const statusDiv = document.getElementById('status');
    const logDiv = document.getElementById('log-area');
    const btnIniciar = document.getElementById('btn-iniciar');
    const btnReiniciar = document.getElementById('btn-reiniciar');
    let escutaAtiva = false;
    let recognition = null;
    let falandoAtualmente = false;
    let tentativaReinicio = false;

    function addLog(msg, isError = false) {
        const line = document.createElement('div');
        line.innerHTML = `рҹ“Ң ${new Date().toLocaleTimeString()} - ${isError ? 'вқҢ ' : 'вң“ '}${msg}`;
        line.style.color = isError ? '#ffaaaa' : '#aaffcc';
        logDiv.appendChild(line);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function limparMovimentos(texto) {
        let limpo = texto.replace(/\*[^*]*\*/g, '');
        limpo = limpo.replace(/\b(balanГ§ando|abanando|rabo|pata|orelha|latindo|pulando|correndo|sentado|deitado|movendo|gesticulando)\b/gi, '');
        limpo = limpo.replace(/[рҹҗ¶рҹҗ•рҹҗ©рҹҗҫ]/g, '');
        limpo = limpo.replace(/\s+/g, ' ').trim();
        if (limpo === '') return 'Au au!';
        return limpo;
    }

    // ========== FUNГҮГғO DE FALA COM VOZ MELHORADA ==========
    function falar(texto) {
        return new Promise((resolve) => {
            if (falandoAtualmente) {
                resolve();
                return;
            }
            falandoAtualmente = true;
            window.speechSynthesis.cancel();

            let textoLimpo = limparMovimentos(texto);
            if (textoLimpo.length === 0) textoLimpo = "Au au!";

            const utterance = new SpeechSynthesisUtterance(textoLimpo);
            utterance.lang = 'pt-BR';
            utterance.rate = 0.95;        // Velocidade um pouco mais natural
            utterance.pitch = 1.4;         // Tom agudo (voz de crianГ§a)

            // Tenta carregar as vozes disponГӯveis (alguns navegadores precisam de um pequeno delay)
            let vozes = window.speechSynthesis.getVoices();
            if (vozes.length === 0) {
                // Se ainda nГЈo carregou, aguarda um pouco
                window.speechSynthesis.onvoiceschanged = () => {
                    vozes = window.speechSynthesis.getVoices();
                    escolherVoz(utterance, vozes);
                };
            } else {
                escolherVoz(utterance, vozes);
            }

            function escolherVoz(utterance, vozes) {
                // Prioriza voz feminina em portuguГӘs do Brasil
                let vozPtBrFeminina = vozes.find(v => 
                    v.lang === 'pt-BR' && 
                    (v.name.toLowerCase().includes('female') || 
                     v.name.toLowerCase().includes('mulher') ||
                     v.name.toLowerCase().includes('maria') ||
                     v.name.toLowerCase().includes('samantha') ||
                     v.name.toLowerCase().includes('google portuguГӘs feminino'))
                );
                if (vozPtBrFeminina) {
                    utterance.voice = vozPtBrFeminina;
                    addLog(`рҹҺӨ Voz selecionada: ${vozPtBrFeminina.name}`);
                } else {
                    // Caso nГЈo encontre, tenta qualquer voz pt-BR
                    let vozPtBr = vozes.find(v => v.lang === 'pt-BR');
                    if (vozPtBr) {
                        utterance.voice = vozPtBr;
                        addLog(`рҹҺӨ Voz selecionada: ${vozPtBr.name}`);
                    } else {
                        addLog(`рҹҺӨ Usando voz padrГЈo do sistema (nenhuma voz pt-BR encontrada)`);
                    }
                }
            }

            utterance.onstart = () => {
                addLog(`рҹ—ЈпёҸ Falando: "${textoLimpo.substring(0, 80)}"`);
                vEsp.classList.remove('ativo');
                vFal.classList.add('ativo');
                vFal.play().catch(e => addLog(`VГӯdeo falando: ${e.message}`, true));
                statusDiv.innerText = "рҹ’¬ Falando...";
            };
            utterance.onend = () => {
                vFal.classList.remove('ativo');
                vEsp.classList.add('ativo');
                vEsp.play().catch(e => addLog(`VГӯdeo esperando: ${e.message}`, true));
                statusDiv.innerText = "рҹҺ§ Ouvindo...";
                falandoAtualmente = false;
                resolve();
                setTimeout(() => {
                    if (!escutaAtiva && btnReiniciar.style.display !== 'none') {
                        iniciarEscuta();
                    }
                }, 500);
            };
            utterance.onerror = (err) => {
                addLog(`Erro fala: ${err.error}`, true);
                falandoAtualmente = false;
                resolve();
                setTimeout(() => iniciarEscuta(), 800);
            };
            window.speechSynthesis.speak(utterance);
        });
    }

    function respostaLocal(pergunta) {
        const p = pergunta.toLowerCase();
        if (p.includes("oi") || p.includes("olГЎ")) return "Au au! Oi, amigo!";
        if (p.includes("tudo bem")) return "Au au! Tudo bem, e vocГӘ?";
        if (p.includes("nome")) return "Meu nome Г© Bootfriend!";
        if (p.includes("brincar")) return "Au au! Adoro brincar!";
        if (p.includes("obrigado")) return "Au au! De nada!";
        if (p.includes("tchau")) return "Au au! AtГ© logo!";
        return "Au au! Conte-me mais.";
    }

    async function perguntarMistral(pergunta) {
        addLog(`рҹ§  Enviando: "${pergunta}"`);
        statusDiv.innerText = "рҹӨ– Pensando...";
        try {
            const url = "https://api.mistral.ai/v1/chat/completions";
            const payload = {
                model: "open-mistral-7b",
                messages: [
                    { role: "system", content: "VocГӘ Г© um cachorro chamado Bootfriend. Responda SOMENTE com a fala do cachorro, NUNCA descreva aГ§Гөes. Proibido usar asteriscos. Proibido falar de rabo, pata, balanГ§ar, etc. Frases curtas, mГЎximo 2 frases. Use 'au au' com moderaГ§ГЈo." },
                    { role: "user", content: pergunta }
                ],
                temperature: 0.5,
                max_tokens: 35
            };
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_API_KEY}` },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.error) {
                addLog(`вқҢ API erro: ${data.error.message}`, true);
                return respostaLocal(pergunta);
            }
            if (data.choices && data.choices[0] && data.choices[0].message) {
                let resposta = data.choices[0].message.content;
                resposta = limparMovimentos(resposta);
                if (resposta.length === 0) return "Au au!";
                return resposta;
            } else {
                return respostaLocal(pergunta);
            }
        } catch (err) {
            addLog(`рҹ”Ҙ Erro rede: ${err.message}`, true);
            return respostaLocal(pergunta);
        }
    }

    function iniciarEscuta() {
        if (falandoAtualmente) return;
        if (escutaAtiva) return;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) { addLog("вқҢ Microfone nГЈo suportado.", true); return; }
        
        try {
            recognition = new SpeechRec();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            
            recognition.onstart = () => {
                escutaAtiva = true;
                tentativaReinicio = false;
                addLog("рҹҺӨ Microfone ativo - fale agora");
                statusDiv.innerText = "рҹҺҷпёҸ Escutando...";
            };
            recognition.onerror = (e) => {
                addLog(`Erro microfone: ${e.error}`, true);
                escutaAtiva = false;
                if (e.error === 'no-speech') {
                    if (!tentativaReinicio) {
                        tentativaReinicio = true;
                        setTimeout(() => { 
                            tentativaReinicio = false;
                            if (!falandoAtualmente && btnReiniciar.style.display !== 'none') iniciarEscuta(); 
                        }, 2000);
                    }
                } else if (e.error === 'aborted') {
                    addLog("Reconhecimento abortado - pode ser problema de permissГЈo", true);
                    statusDiv.innerText = "рҹ”Ү Clique em REINICIAR se necessГЎrio";
                } else if (e.error === 'not-allowed') {
                    addLog("PermissГЈo do microfone negada. Recarregue a pГЎgina.", true);
                    statusDiv.innerText = "рҹ”Ү PermissГЈo negada - recarregue";
                } else {
                    if (!tentativaReinicio) {
                        tentativaReinicio = true;
                        setTimeout(() => { 
                            tentativaReinicio = false;
                            if (!falandoAtualmente && btnReiniciar.style.display !== 'none') iniciarEscuta(); 
                        }, 3000);
                    }
                }
            };
            recognition.onend = () => {
                addLog("рҹҺӨ Microfone desligado");
                escutaAtiva = false;
                if (!falandoAtualmente && btnReiniciar.style.display !== 'none') {
                    setTimeout(() => {
                        if (!escutaAtiva && !falandoAtualmente && btnReiniciar.style.display !== 'none') {
                            iniciarEscuta();
                        }
                    }, 1000);
                }
            };
            recognition.onresult = async (event) => {
                const fala = event.results[0][0].transcript;
                addLog(`рҹҺҷпёҸ VocГӘ: "${fala}"`);
                statusDiv.innerText = "рҹ’ӯ Pensando...";
                recognition.stop();
                escutaAtiva = false;
                const resposta = await perguntarMistral(fala);
                await falar(resposta);
            };
            recognition.start();
        } catch (err) {
            addLog(`Falha ao iniciar reconhecimento: ${err.message}`, true);
            escutaAtiva = false;
        }
    }

    function reiniciar() {
        window.speechSynthesis.cancel();
        falandoAtualmente = false;
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
            recognition = null;
        }
        escutaAtiva = false;
        tentativaReinicio = false;
        vFal.classList.remove('ativo');
        vEsp.classList.add('ativo');
        vEsp.play().catch(e => addLog(`VГӯdeo: ${e.message}`, true));
        statusDiv.innerText = "Reiniciado. Clique em ATIVAR.";
        btnIniciar.style.display = "inline-block";
        btnReiniciar.style.display = "none";
    }

    btnIniciar.onclick = async () => {
        btnIniciar.style.display = "none";
        btnReiniciar.style.display = "inline-block";
        addLog("рҹҺ¬ Iniciando Bootfriend...");
        vEsp.load(); vFal.load();
        try { await vEsp.play(); } catch(e) { addLog("вҡ пёҸ VГӯdeo nГЈo tocou automГЎtico", true); }
        await falar("Oi, amigo! Estou pronto! Pode falar comigo.");
    };
    btnReiniciar.onclick = reiniciar;
    addLog("рҹ”‘ Bootfriend - com voz de crianГ§a (pitch alto e busca por voz feminina)");
</script>
</body>
</html>
