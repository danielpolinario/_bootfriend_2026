<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bootfriend - Estável e sem movimentos</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: white; }
        #video-container { width: 800px; height: 600px; position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 0 25px #2ecc71; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
        video.ativo { display: block; }
        button { padding: 12px 28px; font-size: 1.2rem; border-radius: 40px; border: none; background: #2ecc71; color: white; font-weight: bold; margin: 20px 10px 10px; cursor: pointer; }
        button:hover { background: #27ae60; }
        #status { background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 30px; margin-top: 15px; color: #f1c40f; text-align: center; }
        .log { background: #1e1e2f; padding: 8px 12px; border-radius: 12px; font-family: monospace; font-size: 0.7rem; max-width: 800px; margin-top: 15px; overflow-y: auto; max-height: 150px; width: 80%; color: #ccc; }
    </style>
</head>
<body>
<div id="video-container">
    <video id="vid-esperando" src="esperando.mp4" loop muted playsinline class="ativo"></video>
    <video id="vid-falando" src="falando.mp4" loop muted playsinline></video>
</div>
<div>
    <button id="btn-iniciar">🐕 ATIVAR BOOTFRIEND</button>
    <button id="btn-reiniciar" style="display:none;">🔄 REINICIAR</button>
</div>
<div id="status">🔘 Clique no botão verde</div>
<div class="log" id="log-area">📋 <span>Log:</span><br>✅ Pronto!</div>

<script>
    const MISTRAL_API_KEY = "izShTxzAgCk8eqaODmq0LTw9P1AbEDtr";
    
    const vEsp = document.getElementById('vid-esperando');
    const vFal = document.getElementById('vid-falando');
    const statusDiv = document.getElementById('status');
    const logDiv = document.getElementById('log-area');
    const btnIniciar = document.getElementById('btn-iniciar');
    const btnReiniciar = document.getElementById('btn-reiniciar');
    let escutaAtiva = false;
    let recognition = null;
    let falandoAtualmente = false; // Evita sobreposição de fala

    function addLog(msg, isError = false) {
        const line = document.createElement('div');
        line.innerHTML = `📌 ${new Date().toLocaleTimeString()} - ${isError ? '❌ ' : '✓ '}${msg}`;
        line.style.color = isError ? '#ffaaaa' : '#aaffcc';
        logDiv.appendChild(line);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Função para limpar texto de movimentos
    function limparMovimentos(texto) {
        // Remove qualquer coisa entre asteriscos
        let limpo = texto.replace(/\*[^*]*\*/g, '');
        // Remove palavras comuns de ação
        limpo = limpo.replace(/\b(balançando|abanando|rabo|pata|orelha|latindo|pulando|correndo|sentado|deitado|movendo|gesticulando)\b/gi, '');
        // Remove emojis de animais ou outros (opcional)
        limpo = limpo.replace(/[🐶🐕🐩🐾]/g, '');
        // Remove espaços extras
        limpo = limpo.replace(/\s+/g, ' ').trim();
        if (limpo === '') return 'Au au!';
        return limpo;
    }

    function falar(texto) {
        return new Promise((resolve) => {
            if (falandoAtualmente) {
                resolve();
                return;
            }
            falandoAtualmente = true;
            window.speechSynthesis.cancel();
            let textoLimpo = limparMovimentos(texto);
            if (textoLimpo.length === 0) textoLimpo = "Au au!";
            const utterance = new SpeechSynthesisUtterance(textoLimpo);
            utterance.lang = 'pt-BR';
            utterance.rate = 0.9;
            utterance.pitch = 1.2;
            utterance.onstart = () => {
                addLog(`🗣️ Falando: "${textoLimpo.substring(0, 80)}"`);
                vEsp.classList.remove('ativo');
                vFal.classList.add('ativo');
                vFal.play().catch(e => addLog(`Vídeo falando: ${e.message}`, true));
                statusDiv.innerText = "💬 Falando...";
            };
            utterance.onend = () => {
                vFal.classList.remove('ativo');
                vEsp.classList.add('ativo');
                vEsp.play().catch(e => addLog(`Vídeo esperando: ${e.message}`, true));
                statusDiv.innerText = "🎧 Ouvindo...";
                falandoAtualmente = false;
                resolve();
                // Aguarda um pouco para não sobrecarregar e reinicia escuta
                setTimeout(() => {
                    if (escutaAtiva === false && btnReiniciar.style.display !== 'none') {
                        iniciarEscuta();
                    }
                }, 300);
            };
            utterance.onerror = (err) => {
                addLog(`Erro fala: ${err.error}`, true);
                falandoAtualmente = false;
                resolve();
                setTimeout(() => iniciarEscuta(), 500);
            };
            window.speechSynthesis.speak(utterance);
        });
    }

    // Respostas locais de emergência
    function respostaLocal(pergunta) {
        const p = pergunta.toLowerCase();
        if (p.includes("oi") || p.includes("olá")) return "Au au! Oi, amigo!";
        if (p.includes("tudo bem")) return "Au au! Tudo bem, e você?";
        if (p.includes("nome")) return "Meu nome é Bootfriend!";
        if (p.includes("brincar")) return "Au au! Adoro brincar!";
        if (p.includes("obrigado")) return "Au au! De nada!";
        if (p.includes("tchau")) return "Au au! Até logo!";
        return "Au au! Conte-me mais.";
    }

    async function perguntarMistral(pergunta) {
        addLog(`🧠 Enviando: "${pergunta}"`);
        statusDiv.innerText = "🤖 Pensando...";
        try {
            const url = "https://api.mistral.ai/v1/chat/completions";
            const payload = {
                model: "open-mistral-7b",
                messages: [
                    { role: "system", content: "Você é um cachorro chamado Bootfriend. Responda SOMENTE com a fala do cachorro, NUNCA descreva ações. Proibido usar asteriscos. Proibido falar de rabo, pata, balançar, latir, etc. Frases curtas, máximo 2 frases. Use 'au au' com moderação." },
                    { role: "user", content: pergunta }
                ],
                temperature: 0.5,
                max_tokens: 35
            };
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_API_KEY}` },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.error) {
                addLog(`❌ API erro: ${data.error.message}`, true);
                return respostaLocal(pergunta);
            }
            if (data.choices && data.choices[0] && data.choices[0].message) {
                let resposta = data.choices[0].message.content;
                resposta = limparMovimentos(resposta);
                if (resposta.length === 0) return "Au au!";
                return resposta;
            } else {
                return respostaLocal(pergunta);
            }
        } catch (err) {
            addLog(`🔥 Erro rede: ${err.message}`, true);
            return respostaLocal(pergunta);
        }
    }

    function iniciarEscuta() {
        if (falandoAtualmente) {
            addLog("⏳ Aguardando fim da fala para escutar...");
            return;
        }
        if (escutaAtiva) {
            try { recognition?.stop(); } catch(e) {}
        }
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) { addLog("❌ Microfone não suportado.", true); return; }
        recognition = new SpeechRec();
        recognition.lang = 'pt-BR';
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.onstart = () => { escutaAtiva = true; addLog("🎤 Microfone ativo - fale agora"); statusDiv.innerText = "🎙️ Escutando..."; };
        recognition.onerror = (e) => {
            addLog(`Erro microfone: ${e.error}`, true);
            escutaAtiva = false;
            if (e.error === 'no-speech') {
                setTimeout(() => { if (!falandoAtualmente && btnReiniciar.style.display !== 'none') iniciarEscuta(); }, 1500);
            } else if (e.error === 'network') {
                setTimeout(() => { if (!falandoAtualmente && btnReiniciar.style.display !== 'none') iniciarEscuta(); }, 2000);
            }
        };
        recognition.onend = () => {
            addLog("🎤 Microfone desligado");
            escutaAtiva = false;
            if (!falandoAtualmente && btnReiniciar.style.display !== 'none') {
                setTimeout(iniciarEscuta, 800);
            }
        };
        recognition.onresult = async (event) => {
            const fala = event.results[0][0].transcript;
            addLog(`🎙️ Você: "${fala}"`);
            statusDiv.innerText = "💭 Pensando...";
            recognition.stop();
            escutaAtiva = false;
            const resposta = await perguntarMistral(fala);
            await falar(resposta);
        };
        try { recognition.start(); } catch(err) { addLog(`Falha: ${err}`, true); escutaAtiva = false; }
    }

    function reiniciar() {
        window.speechSynthesis.cancel();
        falandoAtualmente = false;
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        escutaAtiva = false;
        vFal.classList.remove('ativo');
        vEsp.classList.add('ativo');
        vEsp.play().catch(e => addLog(`Vídeo: ${e.message}`, true));
        statusDiv.innerText = "Reiniciado. Clique em ATIVAR.";
        btnIniciar.style.display = "inline-block";
        btnReiniciar.style.display = "none";
    }

    btnIniciar.onclick = async () => {
        btnIniciar.style.display = "none";
        btnReiniciar.style.display = "inline-block";
        addLog("🎬 Iniciando...");
        vEsp.load(); vFal.load();
        try { await vEsp.play(); } catch(e) { addLog("⚠️ Vídeo não tocou automático", true); }
        await falar("Oi, amigo! Estou pronto! Pode falar comigo.");
    };
    btnReiniciar.onclick = reiniciar;
    addLog("🔑 Bootfriend versão estável - sem movimentos e com reconexão automática");
</script>
</body>
</html>
