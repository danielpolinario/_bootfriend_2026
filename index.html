<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bootfriend - Rápido e Curto</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: white; }
        #video-container { width: 800px; height: 600px; position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 0 25px #2ecc71; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
        video.ativo { display: block; }
        button { padding: 12px 28px; font-size: 1.2rem; border-radius: 40px; border: none; background: #2ecc71; color: white; font-weight: bold; margin: 20px 10px 10px; cursor: pointer; }
        button:hover { background: #27ae60; }
        #status { background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 30px; margin-top: 15px; color: #f1c40f; text-align: center; }
        .log { background: #1e1e2f; padding: 8px 12px; border-radius: 12px; font-family: monospace; font-size: 0.7rem; max-width: 800px; margin-top: 15px; overflow-y: auto; max-height: 120px; width: 80%; color: #ccc; display: none; } /* esconde o log para ficar mais limpo, mas você pode mostrar se quiser */
    </style>
</head>
<body>
<div id="video-container">
    <video id="vid-esperando" src="esperando.mp4" loop muted playsinline class="ativo"></video>
    <video id="vid-falando" src="falando.mp4" loop muted playsinline></video>
</div>
<div>
    <button id="btn-iniciar">🐕 ATIVAR BOOTFRIEND</button>
    <button id="btn-reiniciar" style="display:none;">🔄 REINICIAR</button>
</div>
<div id="status">🔘 Clique no botão verde para começar</div>

<script>
    const MISTRAL_API_KEY = "izShTxzAgCk8eqaODmq0LTw9P1AbEDtr";
    
    const vEsp = document.getElementById('vid-esperando');
    const vFal = document.getElementById('vid-falando');
    const statusDiv = document.getElementById('status');
    const btnIniciar = document.getElementById('btn-iniciar');
    const btnReiniciar = document.getElementById('btn-reiniciar');
    let escutaAtiva = false;
    let recognition = null;

    function falar(texto) {
        return new Promise((resolve) => {
            window.speechSynthesis.cancel();
            // Limpa descrições de ações (ex: "*balançando o rabo*")
            let textoLimpo = texto.replace(/[*_~].*?[*_~]/g, '').replace(/\([^)]*\)/g, '').trim();
            // Se ficou muito longo, corta na primeira frase
            if (textoLimpo.length > 100) {
                textoLimpo = textoLimpo.split(/[.!?]/)[0] + '.';
            }
            const utterance = new SpeechSynthesisUtterance(textoLimpo);
            utterance.lang = 'pt-BR';
            utterance.rate = 0.9;
            utterance.pitch = 1.2;
            utterance.onstart = () => {
                vEsp.classList.remove('ativo');
                vFal.classList.add('ativo');
                vFal.play().catch(e => console.log(e));
                statusDiv.innerText = "💬 " + textoLimpo;
            };
            utterance.onend = () => {
                vFal.classList.remove('ativo');
                vEsp.classList.add('ativo');
                vEsp.play().catch(e => console.log(e));
                statusDiv.innerText = "🎧 Ouvindo... fale algo!";
                resolve();
                if (escutaAtiva === false && btnReiniciar.style.display !== 'none') iniciarEscuta();
            };
            utterance.onerror = () => { resolve(); iniciarEscuta(); };
            window.speechSynthesis.speak(utterance);
        });
    }

    async function perguntarMistral(pergunta) {
        statusDiv.innerText = "🤔 Pensando...";
        try {
            const url = "https://api.mistral.ai/v1/chat/completions";
            const payload = {
                model: "mistral-tiny", // modelo mais rápido
                messages: [
                    { role: "system", content: "Você é um cachorrinho chamado Bootfriend. Responda APENAS com UMA frase curta, no máximo 6 palavras. NUNCA descreva ações. Use 'au au' se quiser. Exemplo: 'Au au! Estou feliz!'" },
                    { role: "user", content: pergunta }
                ],
                temperature: 0.5,
                max_tokens: 30
            };
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_API_KEY}` },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.choices && data.choices[0] && data.choices[0].message) {
                let resposta = data.choices[0].message.content;
                // Remove ações entre asteriscos ou parênteses
                resposta = resposta.replace(/[*_~].*?[*_~]/g, '').replace(/\([^)]*\)/g, '').trim();
                if (resposta.length > 80) resposta = resposta.substring(0, 80);
                return resposta;
            } else {
                return "Au au!";
            }
        } catch (err) {
            return "Au au! Fale de novo.";
        }
    }

    function iniciarEscuta() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) { statusDiv.innerText = "Seu navegador não suporta microfone. Use Chrome."; return; }
        if (escutaAtiva) { try { recognition?.stop(); } catch(e) {} }
        recognition = new SpeechRec();
        recognition.lang = 'pt-BR';
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.onstart = () => { escutaAtiva = true; statusDiv.innerText = "🎙️ Escutando... fale!"; };
        recognition.onerror = (e) => {
            escutaAtiva = false;
            if (e.error === 'no-speech') setTimeout(() => { if (!window.speechSynthesis.speaking) iniciarEscuta(); }, 1500);
            else statusDiv.innerText = "Erro no microfone. Tente reiniciar.";
        };
        recognition.onend = () => { escutaAtiva = false; if (!window.speechSynthesis.speaking) setTimeout(iniciarEscuta, 800); };
        recognition.onresult = async (event) => {
            const fala = event.results[0][0].transcript;
            statusDiv.innerText = "💭 Processando...";
            recognition.stop(); escutaAtiva = false;
            const resposta = await perguntarMistral(fala);
            await falar(resposta);
        };
        try { recognition.start(); } catch(err) { statusDiv.innerText = "Erro ao iniciar microfone."; }
    }

    function reiniciar() {
        window.speechSynthesis.cancel();
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        escutaAtiva = false;
        vFal.classList.remove('ativo');
        vEsp.classList.add('ativo');
        vEsp.play().catch(e => {});
        statusDiv.innerText = "Reiniciado. Clique em ATIVAR.";
        btnIniciar.style.display = "inline-block";
        btnReiniciar.style.display = "none";
    }

    btnIniciar.onclick = async () => {
        btnIniciar.style.display = "none";
        btnReiniciar.style.display = "inline-block";
        vEsp.load(); vFal.load();
        try { await vEsp.play(); } catch(e) {}
        await falar("Oi, amigo! Fale comigo!");
    };
    btnReiniciar.onclick = reiniciar;
</script>
</body>
</html>
