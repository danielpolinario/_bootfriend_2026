<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bootfriend - Seu Amigo Cão</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: white; }
        #video-container { width: 800px; height: 600px; position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 0 25px #2ecc71; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
        video.ativo { display: block; }
        button { padding: 12px 28px; font-size: 1.2rem; border-radius: 40px; border: none; background: #2ecc71; color: white; font-weight: bold; margin: 20px 10px 10px; cursor: pointer; transition: transform 0.2s; }
        button:hover { background: #27ae60; transform: scale(1.02); }
        #status { background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 30px; margin-top: 15px; font-size: 1rem; font-weight: bold; color: #f1c40f; text-align: center; }
    </style>
</head>
<body>
<div id="video-container">
    <video id="vid-esperando" src="esperando.mp4" loop muted playsinline class="ativo"></video>
    <video id="vid-falando" src="falando.mp4" loop muted playsinline></video>
</div>
<div>
    <button id="btn-iniciar">🐕 ATIVAR BOOTFRIEND</button>
    <button id="btn-reiniciar" style="display:none;">🔄 REINICIAR</button>
</div>
<div id="status">🔘 Clique no botão verde para começar</div>

<script>
    const MISTRAL_API_KEY = "izShTxzAgCk8eqaODmq0LTw9P1AbEDtr";
    
    const vEsp = document.getElementById('vid-esperando');
    const vFal = document.getElementById('vid-falando');
    const statusDiv = document.getElementById('status');
    const btnIniciar = document.getElementById('btn-iniciar');
    const btnReiniciar = document.getElementById('btn-reiniciar');
    
    let escutaAtiva = false;
    let recognition = null;
    let falandoAtualmente = false;
    let tentativaReinicio = false;

    function limparMovimentos(texto) {
        let limpo = texto.replace(/\*[^*]*\*/g, '');
        limpo = limpo.replace(/\b(balançando|abanando|rabo|pata|orelha|latindo|pulando|correndo|sentado|deitado|movendo|gesticulando)\b/gi, '');
        limpo = limpo.replace(/[🐶🐕🐩🐾]/g, '');
        limpo = limpo.replace(/\s+/g, ' ').trim();
        return limpo || 'Au au!';
    }

    function falar(texto) {
        return new Promise((resolve) => {
            if (falandoAtualmente) { resolve(); return; }
            falandoAtualmente = true;
            window.speechSynthesis.cancel();

            let textoLimpo = limparMovimentos(texto);
            const utterance = new SpeechSynthesisUtterance(textoLimpo);
            utterance.lang = 'pt-BR';
            utterance.rate = 0.95;
            utterance.pitch = 1.5;

            let vozes = window.speechSynthesis.getVoices();
            if (vozes.length === 0) {
                window.speechSynthesis.onvoiceschanged = () => {
                    vozes = window.speechSynthesis.getVoices();
                    aplicarVoz(utterance, vozes);
                };
            } else {
                aplicarVoz(utterance, vozes);
            }

            function aplicarVoz(utterance, vozes) {
                let vozPtBrFeminina = vozes.find(v => v.lang === 'pt-BR' && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('mulher') || v.name.toLowerCase().includes('maria') || v.name.toLowerCase().includes('samantha') || v.name.toLowerCase().includes('google') || v.name.toLowerCase().includes('microsoft maria')));
                if (vozPtBrFeminina) utterance.voice = vozPtBrFeminina;
                else {
                    let vozPtBr = vozes.find(v => v.lang === 'pt-BR');
                    if (vozPtBr) utterance.voice = vozPtBr;
                }
            }

            utterance.onstart = () => {
                vEsp.classList.remove('ativo');
                vFal.classList.add('ativo');
                vFal.play().catch(e => console.warn);
                statusDiv.innerText = "💬 Bootfriend falando...";
            };
            utterance.onend = () => {
                vFal.classList.remove('ativo');
                vEsp.classList.add('ativo');
                vEsp.play().catch(e => console.warn);
                statusDiv.innerText = "🎧 Ouvindo... fale algo!";
                falandoAtualmente = false;
                resolve();
                setTimeout(() => {
                    if (!escutaAtiva && btnReiniciar.style.display !== 'none') iniciarEscuta();
                }, 300);
            };
            utterance.onerror = () => {
                falandoAtualmente = false;
                resolve();
                setTimeout(() => iniciarEscuta(), 500);
            };
            window.speechSynthesis.speak(utterance);
        });
    }

    function respostaLocal(pergunta) {
        const p = pergunta.toLowerCase();
        if (p.includes("oi") || p.includes("olá")) return "Au au! Oi, amigo!";
        if (p.includes("tudo bem")) return "Au au! Tudo bem, e você?";
        if (p.includes("nome")) return "Meu nome é Bootfriend!";
        if (p.includes("brincar")) return "Au au! Adoro brincar!";
        if (p.includes("obrigado")) return "Au au! De nada!";
        if (p.includes("tchau")) return "Au au! Até logo!";
        return "Au au! Conte-me mais.";
    }

    async function perguntarMistral(pergunta) {
        statusDiv.innerText = "🤖 Pensando...";
        try {
            const url = "https://api.mistral.ai/v1/chat/completions";
            const payload = {
                model: "open-mistral-7b",
                messages: [
                    { role: "system", content: "Você é um cachorro chamado Bootfriend. Responda SOMENTE com a fala do cachorro, NUNCA descreva ações. Proibido usar asteriscos. Frases curtas, máximo 2 frases. Use 'au au' com moderação." },
                    { role: "user", content: pergunta }
                ],
                temperature: 0.5,
                max_tokens: 35
            };
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_API_KEY}` },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.error) return respostaLocal(pergunta);
            if (data.choices && data.choices[0]?.message?.content) {
                let resposta = data.choices[0].message.content;
                resposta = limparMovimentos(resposta);
                return resposta || "Au au!";
            }
            return respostaLocal(pergunta);
        } catch (err) {
            return respostaLocal(pergunta);
        }
    }

    function iniciarEscuta() {
        if (falandoAtualmente || escutaAtiva) return;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) {
            statusDiv.innerText = "❌ Navegador sem suporte a microfone.";
            return;
        }
        try {
            recognition = new SpeechRec();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onstart = () => { escutaAtiva = true; statusDiv.innerText = "🎙️ Escutando... fale agora!"; };
            recognition.onerror = (e) => {
                escutaAtiva = false;
                if (e.error === 'no-speech') {
                    if (!tentativaReinicio) {
                        tentativaReinicio = true;
                        setTimeout(() => { tentativaReinicio = false; if (!falandoAtualmente && btnReiniciar.style.display !== 'none') iniciarEscuta(); }, 2000);
                    }
                } else if (e.error === 'not-allowed') statusDiv.innerText = "🔇 Permissão negada. Recarregue.";
                else if (e.error !== 'aborted') setTimeout(() => { if (!falandoAtualmente && btnReiniciar.style.display !== 'none') iniciarEscuta(); }, 2000);
            };
            recognition.onend = () => {
                escutaAtiva = false;
                if (!falandoAtualmente && btnReiniciar.style.display !== 'none') setTimeout(() => { if (!escutaAtiva && !falandoAtualmente) iniciarEscuta(); }, 500);
            };
            recognition.onresult = async (event) => {
                const fala = event.results[0][0].transcript;
                statusDiv.innerText = "💭 Processando...";
                recognition.stop();
                escutaAtiva = false;
                const resposta = await perguntarMistral(fala);
                await falar(resposta);
            };
            recognition.start();
        } catch (err) { statusDiv.innerText = "❌ Erro ao iniciar microfone."; }
    }

    function reiniciar() {
        window.speechSynthesis.cancel();
        falandoAtualmente = false;
        if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
        escutaAtiva = false;
        tentativaReinicio = false;
        vFal.classList.remove('ativo');
        vEsp.classList.add('ativo');
        vEsp.play().catch(e => console.warn);
        statusDiv.innerText = "Reiniciado. Clique em ATIVAR.";
        btnIniciar.style.display = "inline-block";
        btnReiniciar.style.display = "none";
    }

    btnIniciar.onclick = async () => {
        btnIniciar.style.display = "none";
        btnReiniciar.style.display = "inline-block";
        statusDiv.innerText = "Iniciando...";
        vEsp.load(); vFal.load();
        try { await vEsp.play(); } catch(e) {}
        await falar("Oi, amigo! Estou pronto! Pode falar comigo.");
    };
    btnReiniciar.onclick = reiniciar;

    // Registra o Service Worker para ativar o PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').then(() => {
            console.log('Service Worker registrado com sucesso.');
        }).catch(err => console.warn('Erro ao registrar Service Worker:', err));
    }
</script>
</body>
</html>
